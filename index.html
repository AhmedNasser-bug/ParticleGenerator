<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particle Wrap — Interactive Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Colorful dark gradient */
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Control Panel */
        .controls {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(10, 10, 18, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 14px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls label {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.35);
            gap: 4px;
            min-width: 80px;
        }

        .controls label span.value {
            font-size: 0.85rem;
            color: #fff;
            font-weight: 500;
        }

        .controls input[type="range"] {
            width: 90px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 2px;
            outline: none;
        }

        .controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #7c6;
            cursor: pointer;
            border: 2px solid #0a0a12;
        }

        .controls select {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
        }

        .controls select option {
            background: #14141e;
        }

        /* Demo content — light DOM, sampled for colors */
        .demo-card {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            pointer-events: none;
            padding: 2rem;
        }

        .demo-card h1 {
            font-size: clamp(2.2rem, 7vw, 5.5rem);
            margin: 0;
            font-weight: 250;
            letter-spacing: 0.06em;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .demo-card .subtitle {
            font-size: clamp(0.85rem, 1.4vw, 1.15rem);
            margin-top: 0.6rem;
            color: #a88;
        }

        .demo-card .color-strip {
            display: flex;
            gap: 10px;
            margin-top: 1.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .demo-card .color-strip span {
            display: inline-block;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .demo-card .badge {
            margin-top: 1.2rem;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.04em;
        }

        @media (max-width: 640px) {
            .controls {
                gap: 10px;
                padding: 10px 14px;
                width: 92%;
                bottom: 12px;
            }

            .controls label {
                min-width: 60px;
            }

            .controls input[type="range"] {
                width: 60px;
            }
        }
    </style>
</head>

<body>

    <particle-wrap id="particleWrap" noise-type="perlin" glow="0.35" emission-radius="300" density="2800">
        <div class="demo-card">
            <h1>particle-wrap</h1>
            <div class="subtitle">WebGL2 · Shadow DOM · color-aware · glow</div>

            <!-- Color swatches → particles sample these vibrant hues -->
            <div class="color-strip">
                <span style="background:#ff6b6b"></span>
                <span style="background:#feca57"></span>
                <span style="background:#48dbfb"></span>
                <span style="background:#ff9ff3"></span>
                <span style="background:#54a0ff"></span>
                <span style="background:#5f27cd"></span>
                <span style="background:#ff6348"></span>
                <span style="background:#2ed573"></span>
                <span style="background:#ffa502"></span>
                <span style="background:#e056fd"></span>
            </div>

            <div class="badge" id="statusBadge">perlin · glow 0.35 · 2 800 particles</div>
        </div>
    </particle-wrap>

    <!-- Controls -->
    <div class="controls">
        <label>
            glow
            <input type="range" id="sliderGlow" min="0" max="0.8" step="0.01" value="0.35" />
            <span class="value" id="valGlow">0.35</span>
        </label>
        <label>
            radius
            <input type="range" id="sliderRadius" min="50" max="500" step="10" value="300" />
            <span class="value" id="valRadius">300</span>
        </label>
        <label>
            density
            <input type="range" id="sliderDensity" min="500" max="6000" step="100" value="2800" />
            <span class="value" id="valDensity">2 800</span>
        </label>
        <label>
            noise
            <select id="selectNoise">
                <option value="perlin" selected>perlin</option>
                <option value="white">white</option>
            </select>
        </label>
    </div>

    <script type="module">
        import './GeneratorMain.js';

        const wrap = document.getElementById('particleWrap');
        const badge = document.getElementById('statusBadge');

        const updateBadge = () => {
            const g = wrap.getAttribute('glow');
            const d = wrap.getAttribute('density');
            const n = wrap.getAttribute('noise-type');
            badge.textContent = `${n} · glow ${g} · ${parseInt(d).toLocaleString()} particles`;
        };

        document.getElementById('sliderGlow').addEventListener('input', function () {
            document.getElementById('valGlow').textContent = this.value;
            wrap.setAttribute('glow', this.value);
            updateBadge();
        });
        document.getElementById('sliderRadius').addEventListener('input', function () {
            document.getElementById('valRadius').textContent = this.value;
            wrap.setAttribute('emission-radius', this.value);
            updateBadge();
        });
        document.getElementById('sliderDensity').addEventListener('input', function () {
            document.getElementById('valDensity').textContent = parseInt(this.value).toLocaleString();
            wrap.setAttribute('density', this.value);
            updateBadge();
        });
        document.getElementById('selectNoise').addEventListener('change', function () {
            wrap.setAttribute('noise-type', this.value);
            updateBadge();
        });
    </script>
</body>

</html>
